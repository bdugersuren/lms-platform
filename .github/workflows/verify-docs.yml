# ─────────────────────────────────────────────────────────────────────────────
# Documentation Drift Check
# ─────────────────────────────────────────────────────────────────────────────
#
# What this workflow does
# ────────────────────────
# Every time someone opens or updates a pull request (or pushes directly to
# main), this workflow:
#
#   1. Checks out the branch exactly as submitted.
#   2. Installs all dependencies (root dev deps + each service's deps).
#   3. Re-runs every documentation generator from scratch.
#   4. Asks Git "did any generated file change?"
#      ─ If YES → the committed docs were stale → workflow fails.
#      ─ If NO  → the committed docs match source → workflow passes.
#
# Why this protects the main branch
# ───────────────────────────────────
# Generated files (openapi.json, API Markdown, architecture docs) are the
# source of truth for consumers of this API.  If the code changes and the
# docs are not regenerated, clients built from the docs silently break.
# This workflow ensures that "docs are always in sync" is enforced
# mechanically — no one needs to remember to run `pnpm docs`.
#
# How the git diff check works (brief version — see verify-docs.js for full)
# ────────────────────────────────────────────────────────────────────────────
# After generators run, `git diff --name-only HEAD -- <file>` prints the
# filename only if the new content differs from what was committed.  An empty
# result means the file is identical.  We check both modified-tracked and
# untracked states so that a brand-new generated file that was never committed
# also counts as a failure.
#
# How to fix a failing check locally
# ────────────────────────────────────
#   pnpm install        # make sure all deps are present
#   pnpm docs           # regenerate all docs from source
#   git add docs/       # stage the updated generated files
#   git commit -m "chore: regenerate docs"
#   git push            # re-run CI
# ─────────────────────────────────────────────────────────────────────────────

name: Verify Docs

on:
  push:
    branches:
      - main
    # Only run when files that affect generated docs actually change.
    # This avoids burning CI minutes on pure frontend or infra commits.
    paths:
      - 'services/auth-service/src/**'    # NestJS source → openapi.json changes
      - 'docker-compose.yml'              # compose changes → architecture doc changes
      - 'config/system.yml'              # system config  → architecture doc changes
      - 'scripts/generate-*.js'          # generator logic itself changed
      - 'docs/api/openapi.json'          # committed spec changed directly
      - 'docs/api/README.md'            # committed markdown changed directly
      - 'docs/generated/**'             # committed architecture docs changed

  pull_request:
    branches:
      - main
    paths:
      - 'services/auth-service/src/**'
      - 'docker-compose.yml'
      - 'config/system.yml'
      - 'scripts/generate-*.js'
      - 'docs/api/openapi.json'
      - 'docs/api/README.md'
      - 'docs/generated/**'

  # Allow running this workflow manually from the GitHub Actions tab.
  # Useful when you want to verify docs without making a code change.
  workflow_dispatch:

jobs:
  verify-docs:
    name: Documentation drift check
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      #
      # fetch-depth: 0  →  fetch the full history so `git diff HEAD` always
      # has a HEAD to compare against.  With the default depth of 1 (shallow
      # clone), `git diff HEAD` may fail on certain branch states.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Node.js setup ───────────────────────────────────────────────────
      #
      # We pin the same major version as the engines field in package.json.
      # cache: 'pnpm'  saves the pnpm store between runs — typically cuts
      # install time from ~2 min to ~15 s on warm cache.
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Enable pnpm via Corepack ────────────────────────────────────────
      #
      # Corepack ships with Node ≥16.9 and activates the package manager
      # declared in package.json `packageManager` field.  We do NOT install
      # pnpm via `npm install -g pnpm` because that can pull a different
      # version than what the project declares.
      - name: Enable pnpm via Corepack
        run: corepack enable pnpm

      # ── 4. Get the pnpm store path ─────────────────────────────────────────
      #
      # pnpm stores package tarballs in a content-addressed store outside the
      # project.  We cache this store so subsequent runs skip the download step.
      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store=$(pnpm store path)" >> $GITHUB_OUTPUT

      # ── 5. Restore the pnpm cache ──────────────────────────────────────────
      #
      # key includes the lockfile hash so the cache is invalidated whenever
      # dependencies change.  restore-keys provides a fallback so we still get
      # a partial cache hit on unrelated dependency changes.
      - name: Restore pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      # ── 6. Install all dependencies ────────────────────────────────────────
      #
      # --frozen-lockfile  →  fail if pnpm-lock.yaml is out of date instead of
      #                        silently updating it.  Keeps CI deterministic.
      # This installs:
      #   • Root devDependencies (widdershins, yaml, turbo, …)
      #   • Every workspace package (services/*, packages/*, gateway, web)
      #     so that generate-openapi.js can import NestJS and class-validator.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 7. Run the verification ────────────────────────────────────────────
      #
      # This single command runs ALL generators and then checks git diff.
      # Exits 0 if everything is up to date, exits 1 if any file is stale.
      - name: Verify documentation is up to date
        run: pnpm docs:verify

      # ── 8. Upload generated diff as an artefact (on failure only) ──────────
      #
      # When verification fails, we upload the diff so the developer can see
      # exactly what changed without having to reproduce it locally.
      # `if: failure()` means this step is skipped on success.
      - name: Upload diff on failure
        if: failure()
        run: git diff HEAD -- docs/ > /tmp/docs-drift.diff || true

      - name: Attach diff artefact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: docs-drift-diff
          path: /tmp/docs-drift.diff
          retention-days: 7
