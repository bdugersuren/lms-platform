# docker-compose.override.yml — Development hot-reload overlay
#
# Docker Compose automatically merges this with docker-compose.yml.
# To run production images instead, rename or delete this file.
#
# Strategy:
#   • Services build to 'svc-build' stage (source + workspace node_modules + shared pkgs compiled)
#   • service src/ is bind-mounted so edits are reflected without rebuilding
#   • packages/ is bind-mounted so shared-package edits trigger reloads too
#   • nodemon + ts-node --transpile-only gives ~3 s restarts (no type-check pass)
#   • Memory raised to 512 M (vs 192 M prod) to give ts-node compilation headroom
#
# Recommended local workflow (minimal RAM):
#   pnpm docker:infra            # postgres, redis, rabbitmq, minio (~1.2 GB)
#   pnpm dev:auth                # run auth-service locally with nodemon
#   pnpm dev:gateway             # run gateway locally with nodemon
#
# Full containerised hot-reload workflow:
#   docker compose --profile core up -d   # merges this file automatically
# ---------------------------------------------------------------------------

# ── Extension fields ─────────────────────────────────────────────────────────

x-dev-env: &dev-env
  NODE_ENV: development
  NODE_OPTIONS: --max-old-space-size=384
  TS_NODE_TRANSPILE_ONLY: "true"

x-dev-deploy: &dev-deploy
  deploy:
    resources:
      limits:
        memory: 512M

# ── Services ─────────────────────────────────────────────────────────────────

services:

  # ── core profile ────────────────────────────────────────────────────────────

  gateway:
    build:
      target: svc-build
    working_dir: /app/gateway
    command: sh /docker-dev.sh
    <<: *dev-deploy
    environment: *dev-env
    volumes:
      - ./scripts/docker-dev.sh:/docker-dev.sh:ro
      - ./gateway/src:/app/gateway/src:delegated
      - ./packages:/app/packages:delegated

  auth-service:
