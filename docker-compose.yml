# =============================================================================
# LMS Platform — Docker Compose
# All services share the lms-net network.
# Infrastructure services must be healthy before app services start.
# =============================================================================

networks:
  lms-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
  ollama_data:

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — single instance, all service databases created via init.sql
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: lms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    networks:
      - lms-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Redis — token blacklist, rate limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: lms-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - lms-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # RabbitMQ — async event bus
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: lms-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit log_levels [{connection,error},{default,error}]"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infra/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./infra/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - lms-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # MinIO — object storage (media files)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: lms-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - lms-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Web — Next.js frontend (served through nginx on port 80)
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: lms-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      HOSTNAME: 0.0.0.0
    networks:
      - lms-net
    depends_on:
      gateway:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # NGINX — reverse proxy: / → web, /api → gateway
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: lms-nginx
    restart: unless-stopped
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    networks:
      - lms-net
    depends_on:
      gateway:
        condition: service_started
      web:
        condition: service_started

  # ---------------------------------------------------------------------------
  # Gateway — API gateway (NestJS + Fastify)
  # ---------------------------------------------------------------------------
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
      target: runner
    container_name: lms-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${GATEWAY_PORT:-3000}
      NODE_ENV: ${GATEWAY_NODE_ENV:-development}
    ports:
      - "3000:3000"
    networks:
      - lms-net
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Course Service — courses, modules, lessons
  # ---------------------------------------------------------------------------
  course-service:
    build:
      context: .
      dockerfile: services/course-service/Dockerfile
      target: runner
    container_name: lms-course-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${COURSE_PORT:-3003}
      NODE_ENV: ${COURSE_NODE_ENV:-development}
      DATABASE_URL: ${COURSE_DATABASE_URL}
    ports:
      - "3003:3003"
    networks:
      - lms-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Media Service — video uploads, transcoding, subtitles, MinIO management
  # ---------------------------------------------------------------------------
  media-service:
    build:
      context: .
      dockerfile: services/media-service/Dockerfile
      target: runner
    container_name: lms-media-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${MEDIA_PORT:-3011}
      NODE_ENV: ${MEDIA_NODE_ENV:-development}
      DATABASE_URL: ${MEDIA_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-lms.events}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-lms-media}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      UPLOAD_MAX_SIZE_MB: ${UPLOAD_MAX_SIZE_MB:-500}
      PRESIGN_EXPIRES_SECONDS: ${PRESIGN_EXPIRES_SECONDS:-7200}
    ports:
      - "3011:3011"
    networks:
      - lms-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3011/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Notification Service — email, SMS, push, in-app notifications
  # ---------------------------------------------------------------------------
  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
      target: runner
    container_name: lms-notification-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${NOTIFICATION_PORT:-3010}
      NODE_ENV: ${NOTIFICATION_NODE_ENV:-development}
      DATABASE_URL: ${NOTIFICATION_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-lms.events}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-"LMS Platform <noreply@lms.example.com>"}
    ports:
      - "3010:3010"
    networks:
      - lms-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3010/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Ollama — local LLM inference engine
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: lms-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - lms-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---------------------------------------------------------------------------
  # Certificate Service — generation, QR verification, public validation
  # ---------------------------------------------------------------------------
  certificate-service:
    build:
      context: .
      dockerfile: services/certificate-service/Dockerfile
      target: runner
    container_name: lms-certificate-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${CERTIFICATE_PORT:-3012}
      NODE_ENV: ${CERTIFICATE_NODE_ENV:-development}
      DATABASE_URL: ${CERTIFICATE_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-lms.events}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-lms-media}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9000}
      APP_PUBLIC_URL: ${APP_PUBLIC_URL:-http://localhost:3002}
    ports:
      - "3012:3012"
    networks:
      - lms-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3012/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Analytics Service — KPI, reports, AI analytics, dashboards
  # ---------------------------------------------------------------------------
  analytics-service:
    build:
      context: .
      dockerfile: services/analytics-service/Dockerfile
      target: runner
    container_name: lms-analytics-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${ANALYTICS_PORT:-3013}
      NODE_ENV: ${ANALYTICS_NODE_ENV:-development}
      DATABASE_URL: ${ANALYTICS_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-lms.events}
    ports:
      - "3013:3013"
    networks:
      - lms-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3013/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # AI Service — AI tutor, essay scoring, recommendations, skill graph
  # ---------------------------------------------------------------------------
  ai-service:
    build:
      context: .
      dockerfile: services/ai-service/Dockerfile
      target: runner
    container_name: lms-ai-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${AI_PORT:-3009}
      NODE_ENV: ${AI_NODE_ENV:-development}
      DATABASE_URL: ${AI_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-lms.events}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      OLLAMA_TIMEOUT_MS: ${OLLAMA_TIMEOUT_MS:-120000}
    ports:
      - "3009:3009"
    networks:
      - lms-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ollama:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3009/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Enrollment Service — enrollments & progress tracking
  # ---------------------------------------------------------------------------
  enrollment-service:
    build:
      context: .
      dockerfile: services/enrollment-service/Dockerfile
      target: runner
    container_name: lms-enrollment-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${ENROLLMENT_PORT:-3004}
      NODE_ENV: ${ENROLLMENT_NODE_ENV:-development}
      DATABASE_URL: ${ENROLLMENT_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      COURSE_SERVICE_URL: http://course-service:3003
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_EXCHANGE: ${RABBITMQ_EXCHANGE:-lms.events}
    ports:
      - "3004:3004"
    networks:
      - lms-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      course-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Wallet Service — wallet, transactions, revenue sharing, payouts
  # IMPORTANT: Financial logic MUST be isolated.
  # ---------------------------------------------------------------------------
  wallet-service:
    build:
      context: .
      dockerfile: services/wallet-service/Dockerfile
      target: runner
    container_name: lms-wallet-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${WALLET_PORT:-3007}
      NODE_ENV: ${WALLET_NODE_ENV:-development}
      DATABASE_URL: ${WALLET_DATABASE_URL}
    ports:
      - "3007:3007"
    networks:
      - lms-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3007/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Payment Service — QPay, SocialPay, payment verification, webhook handling
  # ---------------------------------------------------------------------------
  payment-service:
    build:
      context: .
      dockerfile: services/payment-service/Dockerfile
      target: runner
    container_name: lms-payment-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${PAYMENT_PORT:-3008}
      NODE_ENV: ${PAYMENT_NODE_ENV:-development}
      DATABASE_URL: ${PAYMENT_DATABASE_URL}
    ports:
      - "3008:3008"
    networks:
      - lms-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3008/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Assignment Service — assignments, grading, submissions
  # ---------------------------------------------------------------------------
  assignment-service:
    build:
      context: .
      dockerfile: services/assignment-service/Dockerfile
      target: runner
    container_name: lms-assignment-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${ASSIGNMENT_PORT:-3006}
      NODE_ENV: ${ASSIGNMENT_NODE_ENV:-development}
      DATABASE_URL: ${ASSIGNMENT_DATABASE_URL}
    ports:
      - "3006:3006"
    networks:
      - lms-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3006/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Quiz Service — quizzes, adaptive exams, question bank, submissions
  # ---------------------------------------------------------------------------
  quiz-service:
    build:
      context: .
      dockerfile: services/quiz-service/Dockerfile
      target: runner
    container_name: lms-quiz-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${QUIZ_PORT:-3005}
      NODE_ENV: ${QUIZ_NODE_ENV:-development}
      DATABASE_URL: ${QUIZ_DATABASE_URL}
    ports:
      - "3005:3005"
    networks:
      - lms-net
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ---------------------------------------------------------------------------
  # Auth Service — authentication & authorization
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
      target: runner
    container_name: lms-auth-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: ${AUTH_PORT:-3001}
      NODE_ENV: ${AUTH_NODE_ENV:-development}
      DATABASE_URL: ${AUTH_DATABASE_URL}
    ports:
      - "3001:3001"
    networks:
      - lms-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
