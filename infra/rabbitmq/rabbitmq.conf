## RabbitMQ configuration for LMS Platform

# Load definitions on startup (exchanges, queues, bindings)
# Users are created via RABBITMQ_DEFAULT_USER / RABBITMQ_DEFAULT_PASS env vars
load_definitions = /etc/rabbitmq/definitions.json

# Logging
log.console = true
log.console.level = warning
log.file = false

# Heartbeat
heartbeat = 60

# Memory high watermark
vm_memory_high_watermark.relative = 0.8

# Max message size: 128MB
max_message_size = 134217728
