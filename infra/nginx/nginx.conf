worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format json_combined escape=json
    '{'
      '"time":"$time_iso8601",'
      '"remote_addr":"$remote_addr",'
      '"method":"$request_method",'
      '"uri":"$request_uri",'
      '"status":$status,'
      '"bytes_sent":$bytes_sent,'
      '"request_time":$request_time,'
      '"upstream_response_time":"$upstream_response_time",'
      '"correlation_id":"$http_x_correlation_id"'
    '}';

  access_log /var/log/nginx/access.log json_combined;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  server_tokens off;

  client_max_body_size 500m;
  client_body_timeout 300s;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;

  # Docker's embedded DNS — re-resolve every 30s so container restarts don't break routing
  resolver 127.0.0.11 valid=30s ipv6=off;

  # ─── Server ───────────────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API → gateway ────────────────────────────────────────────────────
    location /api {
      set $upstream_gateway http://gateway:3000;
      proxy_pass $upstream_gateway;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 300s;
      proxy_connect_timeout 75s;
    }

    # ── MinIO direct object access (presigned PUT/GET from browser) ──────
    location /minio-store/ {
      # Preflight — handled entirely by nginx, never forwarded to MinIO
      if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin'  '*';
        add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, HEAD, DELETE, OPTIONS';
        add_header 'Access-Control-Allow-Headers' '*';
        add_header 'Access-Control-Expose-Headers' 'ETag';
        add_header 'Access-Control-Max-Age'        '3600';
        add_header 'Content-Type'                  'text/plain; charset=utf-8';
        add_header 'Content-Length'                '0';
        return 204;
      }

      proxy_pass http://minio:9000/;

      # Must match the host the presigned URL was signed for
      proxy_set_header Host minio:9000;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_http_version 1.1;
      proxy_buffering off;
      proxy_request_buffering off;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;

      # Add CORS headers to all MinIO responses
      add_header 'Access-Control-Allow-Origin'  '*'                                              always;
      add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, HEAD, DELETE, OPTIONS'          always;
      add_header 'Access-Control-Allow-Headers' '*'                                              always;
      add_header 'Access-Control-Expose-Headers' 'ETag'                                         always;
    }

    # ── Next.js static chunks (aggressive caching) ───────────────────────
    location /_next/static {
      set $upstream_web http://web:3002;
      proxy_pass $upstream_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Frontend → Next.js ───────────────────────────────────────────────
    location / {
      set $upstream_web http://web:3002;
      proxy_pass $upstream_web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;
      proxy_read_timeout 60s;
    }
  }
}
